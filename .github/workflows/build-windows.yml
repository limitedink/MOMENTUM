name: Build Windows desktop app

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Backend URL embedded in this build (for example http://192.168.20.25:3000)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VITE_MOMENTUM_PARTY_MODE: authoritative
      VITE_MOMENTUM_BACKEND_URL: ${{ inputs.backend_url }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Tauri Windows installers
        run: npm run tauri:build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: momentum-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
